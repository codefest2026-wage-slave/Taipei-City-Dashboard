{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "taipei-city-dashboard.fullname" . }}-backend
  labels:
    {{- include "taipei-city-dashboard.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  strategy:
    type: {{ default "RollingUpdate" .Values.backend.updateStrategy.type }}
    {{- if and .Values.backend.updateStrategy.rollingUpdate (eq (default "RollingUpdate" .Values.backend.updateStrategy.type) "RollingUpdate") }}
    rollingUpdate:
      maxSurge: {{ .Values.backend.updateStrategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.backend.updateStrategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "taipei-city-dashboard.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "taipei-city-dashboard.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "taipei-city-dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: backend
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "taipei-city-dashboard.image" (merge (dict "repository" .Values.backend.image.repository "tag" .Values.backend.image.tag) .) }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.targetPort }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.externalDatabase.enabled }}
            # External Database Configuration
            - name: DB_DASHBOARD_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_HOST
            - name: DB_DASHBOARD_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_PORT
            - name: DB_DASHBOARD_DBNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_DBNAME
            - name: DB_DASHBOARD_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_USER
            - name: DB_DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_PASSWORD
            - name: DB_DASHBOARD_SSLMODE
              value: {{ .Values.externalDatabase.dashboard.sslMode | quote }}
            {{- if .Values.externalDatabase.manager.enabled }}
            - name: DB_MANAGER_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_MANAGER_HOST
            - name: DB_MANAGER_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_MANAGER_PORT
            - name: DB_MANAGER_DBNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_MANAGER_DBNAME
            - name: DB_MANAGER_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_MANAGER_USER
            - name: DB_MANAGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_MANAGER_PASSWORD
            - name: DB_MANAGER_SSLMODE
              value: {{ .Values.externalDatabase.manager.sslMode | quote }}
            {{- else }}
            # Use same database for manager
            - name: DB_MANAGER_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_HOST
            - name: DB_MANAGER_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_PORT
            - name: DB_MANAGER_DBNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_DBNAME
            - name: DB_MANAGER_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_USER
            - name: DB_MANAGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_PASSWORD
            - name: DB_MANAGER_SSLMODE
              value: {{ .Values.externalDatabase.dashboard.sslMode | quote }}
            {{- end }}
            {{- else }}
            # In-cluster PostgreSQL Configuration
            - name: DB_DASHBOARD_HOST
              value: {{ include "taipei-city-dashboard.fullname" . }}-postgresql
            - name: DB_DASHBOARD_PORT
              value: "5432"
            - name: DB_DASHBOARD_DBNAME
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: DB_DASHBOARD_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: DB_DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_PASSWORD
            - name: DB_DASHBOARD_SSLMODE
              value: "disable"
            # Use same database for manager in cluster deployment
            - name: DB_MANAGER_HOST
              value: {{ include "taipei-city-dashboard.fullname" . }}-postgresql
            - name: DB_MANAGER_PORT
              value: "5432"
            - name: DB_MANAGER_DBNAME
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: DB_MANAGER_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: DB_MANAGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: DB_DASHBOARD_PASSWORD
            - name: DB_MANAGER_SSLMODE
              value: "disable"
            {{- end }}
            {{- if .Values.externalRedis.enabled }}
            # External Redis Configuration
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: REDIS_PORT
            - name: REDIS_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: REDIS_DB
            {{- if .Values.externalRedis.password }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: REDIS_PASSWORD
            {{- else }}
            - name: REDIS_PASSWORD
              value: ""
            {{- end }}
            {{- if .Values.externalRedis.tls.enabled }}
            - name: REDIS_TLS_ENABLED
              value: "true"
            - name: REDIS_TLS_INSECURE_SKIP_VERIFY
              value: {{ .Values.externalRedis.tls.insecureSkipVerify | quote }}
            {{- end }}
            {{- else }}
            # In-cluster Redis Configuration
            - name: REDIS_HOST
              value: {{ include "taipei-city-dashboard.fullname" . }}-redis-master
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: REDIS_PASSWORD
            {{- else }}
            - name: REDIS_PASSWORD
              value: ""
            {{- end }}
            {{- end }}
            {{- range .Values.backend.secretEnv }}
            {{- if not (has .name (list "DB_DASHBOARD_HOST" "DB_DASHBOARD_USER" "DB_DASHBOARD_PASSWORD" "DB_DASHBOARD_DBNAME" "DB_DASHBOARD_PORT" "DB_MANAGER_HOST" "DB_MANAGER_USER" "DB_MANAGER_PASSWORD" "DB_MANAGER_DBNAME" "DB_MANAGER_PORT" "REDIS_HOST" "REDIS_PORT" "REDIS_PASSWORD" "REDIS_DB")) }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: {{ default .name .secretKey }}
                  {{- if .optional }}
                  optional: true
                  {{- end }}
              {{- end }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
