{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "taipei-city-dashboard.fullname" . }}-frontend
  labels:
    {{- include "taipei-city-dashboard.frontend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.frontend.replicaCount }}
  {{- end }}
  strategy:
    type: {{ default "RollingUpdate" .Values.frontend.updateStrategy.type }}
    {{- if and .Values.frontend.updateStrategy.rollingUpdate (eq (default "RollingUpdate" .Values.frontend.updateStrategy.type) "RollingUpdate") }}
    rollingUpdate:
      maxSurge: {{ .Values.frontend.updateStrategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.frontend.updateStrategy.rollingUpdate.maxUnavailable }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "taipei-city-dashboard.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "taipei-city-dashboard.frontend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "taipei-city-dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'mkdir -p /var/cache/nginx && chmod 777 /var/cache/nginx && mkdir -p /nginx-run && chmod 777 /nginx-run']
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /nginx-run
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
      containers:
        - name: frontend
          securityContext:
            {{- if .Values.frontend.securityContext }}
            {{- toYaml .Values.frontend.securityContext | nindent 12 }}
            {{- else }}
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101
            {{- end }}
          image: {{ include "taipei-city-dashboard.image" (merge (dict "repository" .Values.frontend.image.repository "tag" .Values.frontend.image.tag) .) }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              # containerPort resolution order:
              # 1. .Values.frontend.service.targetPort (preferred, aligns with backend structure)
              # 2. .Values.frontend.targetPort (backward compatibility with older values.yaml)
              # 3. .Values.frontend.service.port (last fallback so Deployment remains valid)
              {{- $containerPort := coalesce .Values.frontend.service.targetPort .Values.frontend.targetPort .Values.frontend.service.port }}
              containerPort: {{ $containerPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          env:
            {{- range $key, $value := .Values.frontend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range .Values.frontend.secretEnv }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "taipei-city-dashboard.fullname" $ }}-secrets
                  key: {{ default .name .secretKey }}
                  {{- if .optional }}
                  optional: true
                  {{- end }}
              {{- end }}
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
