# Production values for Azure managed services
# Use this configuration when deploying with Azure Database for PostgreSQL and Azure Cache for Redis

# Global configuration
global:
  imageRegistry: ""

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 3
  
  image:
    repository: ghcr.io/taipei-doit/taipei-city-dashboard-fe
    tag: "2.2.0"
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# Backend configuration  
backend:
  enabled: true
  replicaCount: 3
  
  image:
    repository: ghcr.io/taipei-doit/taipei-city-dashboard-be
    tag: "2.2.0"
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

# External Database Configuration - Azure Database for PostgreSQL
externalDatabase:
  enabled: true
  
  dashboard:
    host: "your-postgres-server.postgres.database.azure.com"
    port: 5432
    database: "dashboard"
    username: "dashboarduser"
    # Password will be read from Azure Key Vault (secret key: db-dashboard-password)
    password: ""
    sslMode: "require"
    
    # Azure specific settings
    azure:
      enabled: true
      useAAD: true  # Use Azure AD authentication
      clientId: "your-managed-identity-client-id"
  
  # Use separate manager database (optional)
  manager:
    enabled: true
    host: "your-postgres-server.postgres.database.azure.com"
    port: 5432
    database: "manager"
    username: "manageruser"
    # Password will be read from Azure Key Vault (secret key: db-manager-password)
    password: ""
    sslMode: "require"

# External Redis Configuration - Azure Cache for Redis
externalRedis:
  enabled: true
  
  host: "your-redis-cache.redis.cache.windows.net"
  port: 6380  # SSL port for Azure Redis
  database: 0
  # Password will be read from Azure Key Vault (secret key: redis-password)
  password: ""
  
  # SSL configuration for Azure Redis
  tls:
    enabled: true
    insecureSkipVerify: false
  
  azure:
    enabled: true
    useNonSslPort: false

# Disable in-cluster databases
postgresql:
  enabled: false

redis:
  enabled: false

# Service Account with Azure Workload Identity
serviceAccount:
  create: true
  annotations:
    azure.workload.identity/client-id: "your-managed-identity-client-id"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: dashboard.taipei.gov.tw
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls:
    - secretName: taipei-dashboard-tls
      hosts:
        - dashboard.taipei.gov.tw

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: "monitoring"
    interval: 30s
    labels:
      prometheus: kube-prometheus

# Security context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534
