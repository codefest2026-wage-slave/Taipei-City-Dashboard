# Development values for local testing
# Use this for development and testing environments

# Global configuration
global:
  imageRegistry: ""

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 1
  
  image:
    repository: ghcr.io/taipei-doit/taipei-city-dashboard-fe
    tag: "latest"
    pullPolicy: Always
  
  service:
    type: NodePort
    port: 80
    nodePort: 443
  
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Development environment variables (non-sensitive)
  env:
    NODE_ENV: "development"
    VITE_APP_TITLE: "Taipei Dashboard (Dev)"
    VITE_APP_VERSION: "2.2.0-dev"
  
  # Frontend configuration that will be read from Azure Key Vault
  secretEnv:
    - name: VITE_API_URL
      secretKey: "vite-api-url-dev"
    - name: VITE_MAPBOXTOKEN
      secretKey: "vite-mapbox-token"
    - name: VITE_MAPBOXTILE
      secretKey: "vite-mapbox-tile"
    - name: VITE_TAIPEIPASS_URL
      secretKey: "taipeipass-url-dev"
    - name: VITE_TAIPEIPASS_CLIENT_ID
      secretKey: "taipeipass-client-id-dev"
    - name: VITE_TAIPEIPASS_SCOPE
      secretKey: "taipeipass-scope"

# Backend configuration
backend:
  enabled: true
  replicaCount: 1
  
  image:
    repository: ghcr.io/taipei-doit/taipei-city-dashboard-be
    tag: "latest"
    pullPolicy: Always
  
  service:
    type: NodePort
    port: 8080
    nodePort: 30088
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  
  # Development environment variables (non-sensitive)
  env:
    GIN_MODE: "debug"
    GIN_PORT: "8080"
  
  # Backend configuration that will be read from Azure Key Vault
  secretEnv:
    - name: GIN_DOMAIN
      secretKey: "gin-domain-dev"
    - name: JWT_SECRET
      secretKey: "jwt-secret-dev"
    - name: IDNO_SALT
      secretKey: "idno-salt-dev"
    - name: ISSO_CLIENT_ID
      secretKey: "isso-client-id-dev"
    - name: ISSO_CLIENT_SECRET
      secretKey: "isso-client-secret-dev"

# Service Account with Azure Workload Identity
serviceAccount:
  create: true
  annotations:
    azure.workload.identity/client-id: "your-managed-identity-client-id"

# Ingress - disabled for development
ingress:
  enabled: false

# Autoscaling - disabled for development
autoscaling:
  enabled: false

# Security - relaxed for development
securityContext:
  runAsNonRoot: false
  runAsUser: 0

# Database Configuration - Use Azure managed databases for development
externalDatabase:
  enabled: true
  
  dashboard:
    host: "your-postgres-server.postgres.database.azure.com"
    port: 5432
    database: "dashboard"
    username: "dashboard_admin"
    # Password will be read from Azure Key Vault or set here for dev
    password: "your-postgres-password"
    sslMode: "require"
    
    # Connection pool settings
    maxOpenConns: 10
    maxIdleConns: 2
    connMaxLifetime: "5m"
    
    # Azure specific settings
    azure:
      enabled: true
      useAAD: false  # Set to true if using Azure AD authentication
      clientId: ""
  
  # Use same database for manager in development
  manager:
    enabled: false

externalRedis:
  enabled: true
  
  host: "your-redis-cache.redis.cache.windows.net"
  port: 6380  # SSL port for Azure Redis
  database: 0
  # Password will be read from Azure Key Vault or set here for dev
  password: "your-redis-password"
  
  # SSL configuration for Azure Redis
  tls:
    enabled: true
    insecureSkipVerify: false
  
  azure:
    enabled: true
    useNonSslPort: false

# Disable in-cluster databases since we're using Azure managed services
postgresql:
  enabled: false

# Disable in-cluster Redis since we're using Azure managed Redis
redis:
  enabled: false

# Monitoring - disabled for development
monitoring:
  enabled: false


