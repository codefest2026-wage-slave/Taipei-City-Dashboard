# Community/Open Source deployment values
# Use this configuration for deploying with external databases (non-Azure)
# Suitable for community users with their own database infrastructure

# Global configuration
global:
  imageRegistry: ""  # Use Docker Hub or your registry

# GitHub Secrets 配置
# 所有 secrets 都通過 GitHub Actions 從 GitHub Repository Secrets 注入

# Image pull secrets (for private registries like ACR)
imagePullSecrets:
  - name: acr-secret

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 1
  
  image:
    repository: citydashboard-dhc2gtetgcfqeqhv.azurecr.io/taipei-city-dashboard-fe
    tag: ""
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  # Frontend environment variables (update these values)
  env:
    NODE_ENV: "sit"
    VITE_APP_TITLE: "Taipei City Dashboard"
    VITE_APP_VERSION: "2.2.0"
  # Disable secretEnv to avoid duplicate env vars when Azure Key Vault is disabled
  secretEnv:
    - name: VITE_MAPBOXTOKEN
      secretKey: "vite-mapbox-token"
    - name: VITE_API_URL
      secretKey: "vite-api-url"
    - name: VITE_MAPBOXTILE
      secretKey: "vite-mapbox-tile"
    - name: VITE_TAIPEIPASS_URL
      secretKey: "taipeipass-url"
    - name: VITE_TAIPEIPASS_CLIENT_ID
      secretKey: "taipeipass-client-id"
    - name: VITE_TAIPEIPASS_SCOPE
      secretKey: "taipeipass-scope"

# Backend configuration  
backend:
  enabled: true
  replicaCount: 2
  
  image:
    repository: citydashboard-dhc2gtetgcfqeqhv.azurecr.io/taipei-city-dashboard-be
    tag: ""
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  # Backend environment variables (update these values)
  env:
    GIN_MODE: "release"
    GIN_PORT: "8080"
  # Disable secretEnv to avoid duplicate env vars when Azure Key Vault is disabled
  secretEnv:
    - name: GIN_DOMAIN
      secretKey: "gin-domain"
    - name: JWT_SECRET
      secretKey: "jwt-secret"
    - name: IDNO_SALT
      secretKey: "idno-salt"
    - name: ISSO_CLIENT_ID
      secretKey: "isso-client-id"
    - name: ISSO_CLIENT_SECRET
      secretKey: "isso-client-secret"
    - name: DB_DASHBOARD_PASSWORD
      secretKey: "db-dashboard-password"
    - name: DB_DASHBOARD_HOST
      secretKey: "db-dashboard-host"
    - name: DB_DASHBOARD_USER
      secretKey: "db-dashboard-user"
    - name: DB_DASHBOARD_DBNAME
      secretKey: "db-dashboard-dbname"
    - name: DB_DASHBOARD_PORT
      secretKey: "db-dashboard-port"
    - name: DB_MANAGER_PASSWORD
      secretKey: "db-manager-password"
    - name: DB_MANAGER_HOST
      secretKey: "db-manager-host"
    - name: DB_MANAGER_USER
      secretKey: "db-manager-user"
    - name: DB_MANAGER_DBNAME
      secretKey: "db-manager-dbname"
    - name: DB_MANAGER_PORT
      secretKey: "db-manager-port"
    - name: REDIS_PASSWORD
      secretKey: "redis-password"
    - name: REDIS_HOST
      secretKey: "redis-host"
    - name: REDIS_PORT
      secretKey: "redis-port"
    - name: REDIS_DB
      secretKey: "redis-db"

# External Database Configuration (停用 - 由後端環境變數直接連接)
externalDatabase:
  enabled: false                               # 停用 Helm 的資料庫配置

# External Redis Configuration (停用 - 由後端環境變數直接連接)  
externalRedis:
  enabled: true                                # 使用外部 Redis
  host: ""                                     # 通過 secrets 設定
  port: "6379"
  password: true                               # 有密碼
  tls:
    enabled: false
    insecureSkipVerify: true

# Disable in-cluster databases
postgresql:
  enabled: false

redis:
  enabled: false

# Service Account (standard Kubernetes)
serviceAccount:
  create: true
  annotations: {}

# Ingress configuration
ingress:
  enabled: false  # Disable ingress for local development
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: your-dashboard-domain.com           # Replace with your domain
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls:
    - secretName: dashboard-tls
      hosts:
        - your-dashboard-domain.com

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Monitoring (optional)
monitoring:
  enabled: false  # Enable if you have Prometheus installed

# Security context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65534

