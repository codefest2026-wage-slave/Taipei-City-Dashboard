# Self-contained deployment values
# Use this configuration for complete in-cluster deployment
# Includes PostgreSQL and Redis deployed within the Kubernetes cluster

# Global configuration
global:
  imageRegistry: ""
  storageClass: "default"  # Change to your preferred storage class

# Frontend configuration
frontend:
  enabled: true
  replicaCount: 2
  
  image:
    repository: taipei-city-dashboard-fe
    tag: "2.2.0"
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  # Frontend environment variables
  env:
    NODE_ENV: "production"
    VITE_API_URL: "https://your-domain.com/api"
    VITE_APP_TITLE: "Taipei City Dashboard"
    VITE_APP_VERSION: "2.2.0"
    VITE_MAPBOXTOKEN: "your-mapbox-token"
    VITE_MAPBOXTILE: "mapbox://styles/mapbox/light-v10"
    VITE_TAIPEIPASS_URL: "https://your-auth-service.com"
    VITE_TAIPEIPASS_CLIENT_ID: "your-oauth-client-id"
    VITE_TAIPEIPASS_SCOPE: "openid profile email"

# Backend configuration  
backend:
  enabled: true
  replicaCount: 2
  
  image:
    repository: taipei-city-dashboard-be
    tag: "2.2.0"
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  # Backend environment variables
  env:
    GIN_MODE: "release"
    GIN_DOMAIN: "your-domain.com"
    GIN_PORT: "8080"
    JWT_SECRET: "your-jwt-secret-key"
    IDNO_SALT: "your-salt-value"
    ISSO_CLIENT_ID: "your-oauth-client-id"
    ISSO_CLIENT_SECRET: "your-oauth-client-secret"

# Use in-cluster databases
externalDatabase:
  enabled: false

externalRedis:
  enabled: false

# In-cluster PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    postgresPassword: "secure-postgres-password"
    username: "dashboard"
    password: "secure-dashboard-password"
    database: "dashboard"
  
  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: "default"  # Adjust based on your cluster
    
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    
    # Security context
    podSecurityContext:
      fsGroup: 1001
    
    # Backup configuration (optional)
    backup:
      enabled: false

# In-cluster Redis Configuration
redis:
  enabled: true
  auth:
    enabled: true
    password: "secure-redis-password"
  
  master:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: "default"  # Adjust based on your cluster
    
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
    
    # Security context
    podSecurityContext:
      fsGroup: 1001
  
  # Disable replica for simplicity (can be enabled for HA)
  replica:
    replicaCount: 0

# Service Account
serviceAccount:
  create: true
  annotations: {}

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: your-dashboard-domain.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls:
    - secretName: dashboard-tls
      hosts:
        - your-dashboard-domain.com

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Monitoring
monitoring:
  enabled: false

# Security context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Resource quotas (optional)
resourceQuota:
  enabled: false
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    persistentvolumeclaims: "10"

# Network policies (optional, for additional security)
networkPolicy:
  enabled: false
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
  egress:
    - to: []
      ports:
      - protocol: TCP
        port: 53
      - protocol: UDP
        port: 53
