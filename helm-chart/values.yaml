# Default values for taipei-city-dashboard.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global configuration
global:
  imageRegistry: ""  # Don't set global registry to avoid affecting subchart dependencies
  imagePullSecrets: []
  storageClass: ""

# Image configuration
image:
  registry: "ghcr.io/taipei-doit"
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Frontend service configuration
frontend:
  enabled: true
  replicaCount: 2
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  image:
    repository: ghcr.io/taipei-doit/taipei-city-dashboard-fe
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 80
    # targetPort separated from port for clarity; template prefers service.targetPort
    targetPort: 8081
  # targetPort (legacy placement) kept for backward compatibility; will be ignored if service.targetPort is set
  targetPort: 8081
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  
  # Environment variables for frontend
  env:
    NODE_ENV: "production"
    VITE_APP_TITLE: "Taipei City Dashboard"
    VITE_APP_VERSION: "2.2.0"
  
  # Frontend configuration that will be read from Azure Key Vault
  secretEnv:
    - name: VITE_API_URL
      secretKey: "vite-api-url"
    - name: VITE_MAPBOXTOKEN
      secretKey: "vite-mapbox-token"
    - name: VITE_MAPBOXTILE
      secretKey: "vite-mapbox-tile"
    - name: VITE_TAIPEIPASS_URL
      secretKey: "taipeipass-url"
    - name: VITE_TAIPEIPASS_CLIENT_ID
      secretKey: "taipeipass-client-id"
    - name: VITE_TAIPEIPASS_SCOPE
      secretKey: "taipeipass-scope"

# Backend service configuration
backend:
  enabled: true
  replicaCount: 2
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  image:
    repository: ghcr.io/taipei-doit/taipei-city-dashboard-be
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  
  # Environment variables for backend
  env:
    GIN_MODE: "release"
    GIN_PORT: "8080"
  
  # Backend configuration that will be read from Azure Key Vault
  secretEnv:
    - name: GIN_DOMAIN
      secretKey: "gin-domain"
    - name: JWT_SECRET
      secretKey: "jwt-secret"
    - name: IDNO_SALT
      secretKey: "idno-salt"
    - name: ISSO_CLIENT_ID
      secretKey: "isso-client-id"
    - name: ISSO_CLIENT_SECRET
      secretKey: "isso-client-secret"
    - name: DB_DASHBOARD_HOST
      secretKey: "db-dashboard-host"
    - name: DB_DASHBOARD_USER
      secretKey: "db-dashboard-user"
    - name: DB_DASHBOARD_PASSWORD
      secretKey: "db-dashboard-password"
    - name: DB_DASHBOARD_DBNAME
      secretKey: "db-dashboard-dbname"
    - name: DB_DASHBOARD_PORT
      secretKey: "db-dashboard-port"
    - name: DB_MANAGER_HOST
      secretKey: "db-manager-host"
    - name: DB_MANAGER_USER
      secretKey: "db-manager-user"
    - name: DB_MANAGER_PASSWORD
      secretKey: "db-manager-password"
    - name: DB_MANAGER_DBNAME
      secretKey: "db-manager-dbname"
    - name: DB_MANAGER_PORT
      secretKey: "db-manager-port"
    - name: REDIS_HOST
      secretKey: "redis-host"
    - name: REDIS_PORT
      secretKey: "redis-port"
    - name: REDIS_PASSWORD
      secretKey: "redis-password"
    - name: REDIS_DB
      secretKey: "redis-db"

# Ingress configuration
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: dashboard.taipei.gov.tw
      paths:
        - path: /
          pathType: Prefix
          service: frontend
        - path: /api
          pathType: Prefix
          service: backend
  tls:
    - secretName: taipei-dashboard-tls
      hosts:
        - dashboard.taipei.gov.tw

# Service Account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations:
    azure.workload.identity/client-id: ""
  # The name of the service account to use.
  name: ""

# Pod Security Context
podSecurityContext:
  fsGroup: 2000

# Security Context
securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# External Database Configuration
# Choose one of the following options:
# 1. Use external managed databases (Azure/AWS/GCP)
# 2. Deploy databases in the cluster using Helm charts
# 3. Use existing databases with custom connection details

# External PostgreSQL Configuration
externalDatabase:
  # Set to true to use external database instead of in-cluster deployment
  enabled: false
  
  # Dashboard Database Configuration
  dashboard:
    host: ""                    # e.g., "your-postgres.database.azure.com"
    port: 5432
    database: "dashboard"
    username: ""                # Database username
    password: ""                # Database password (use secretEnv for production)
    sslMode: "require"          # SSL mode: disable, require, verify-ca, verify-full
    
    # Connection pool settings
    maxOpenConns: 25
    maxIdleConns: 5
    connMaxLifetime: "5m"
    
    # Azure specific settings (if using Azure Database for PostgreSQL)
    azure:
      enabled: false
      # Use Azure AD authentication instead of password
      useAAD: false
      # Managed identity client ID for Azure AD auth
      clientId: ""
  
  # Manager Database Configuration (if different from dashboard)
  manager:
    # Set to true if you want to use a separate manager database
    # If false, will use the same database as dashboard
    enabled: false
    host: ""
    port: 5432
    database: "manager"
    username: ""
    password: ""
    sslMode: "require"

# External Redis Configuration
externalRedis:
  # Set to true to use external Redis instead of in-cluster deployment
  enabled: false
  
  host: ""                      # e.g., "your-redis.redis.cache.windows.net"
  port: 6379
  password: ""                  # Redis password (use secretEnv for production)
  database: 0                   # Redis database number
  
  # SSL/TLS configuration
  tls:
    enabled: false              # Set to true for Azure Redis with SSL
    insecureSkipVerify: false   # Only for development
  
  # Azure specific settings (if using Azure Cache for Redis)
  azure:
    enabled: false
    # Use non-SSL port for Azure Redis (not recommended for production)
    useNonSslPort: false

# In-cluster PostgreSQL Configuration (using Bitnami chart)
# Only used when externalDatabase.enabled = false
postgresql:
  enabled: true                 # Set to false if using external database
  auth:
    postgresPassword: "dashboard-password"
    username: "dashboard"
    password: "dashboard-password"
    database: "dashboard"
  primary:
    persistence:
      enabled: true
      size: 50Gi
      storageClass: "default"
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# In-cluster Redis Configuration (using Bitnami chart)
# Only used when externalRedis.enabled = false
redis:
  enabled: true                 # Set to false if using external Redis
  auth:
    enabled: true
    password: "dashboard-redis-password"
  master:
    persistence:
      enabled: true
      size: 8Gi
      storageClass: "default"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Monitoring
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    namespace: ""
    labels: {}
    interval: 30s
