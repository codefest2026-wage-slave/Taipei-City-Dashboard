name: Build and Deploy

on:
  push:
    branches: ["sit", "pre-develop", "develop"]
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Force deploy backend even if no changes detected"
        type: boolean
        default: false
      force_frontend:
        description: "Force deploy frontend even if no changes detected"
        type: boolean
        default: false

env:
  REGISTRY: citydashboard-dhc2gtetgcfqeqhv.azurecr.io
  RELEASE: taipei-city-dashboard
  BE_IMAGE: taipei-city-dashboard-be
  FE_IMAGE: taipei-city-dashboard-fe
  NAMESPACE: dashboard

jobs:
  # ── 1. 偵測變動 + 計算 tag ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.eval.outputs.backend }}
      frontend: ${{ steps.eval.outputs.frontend }}
      tag: ${{ steps.tag.outputs.value }}
      helm_values: ${{ steps.helm.outputs.file }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Path changes filter
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'Taipei-City-Dashboard-BE/**'
              - 'helm-chart/**'
              - '.github/workflows/build-and-push.yml'
            frontend:
              - 'Taipei-City-Dashboard-FE/**'
              - 'helm-chart/**'
              - '.github/workflows/build-and-push.yml'

      - name: Evaluate
        id: eval
        run: |
          echo "backend=${{ steps.changes.outputs.backend == 'true' || github.event.inputs.force_backend == 'true' }}" >> $GITHUB_OUTPUT
          echo "frontend=${{ steps.changes.outputs.frontend == 'true' || github.event.inputs.force_frontend == 'true' }}" >> $GITHUB_OUTPUT

      - name: Image tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME}-$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Helm values file
        id: helm
        run: |
          case "${{ github.ref_name }}" in
            sit) echo "file=helm-chart/values-sit.yaml" ;;
            *)   echo "file=helm-chart/values-prod.yaml" ;;
          esac >> $GITHUB_OUTPUT

  # ── 2. Build BE (並行) ──
  build-be:
    needs: prepare
    if: needs.prepare.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./Taipei-City-Dashboard-BE
          file: ./Taipei-City-Dashboard-BE/Dockerfile
          target: prod
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.BE_IMAGE }}:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=be
          cache-to: type=gha,scope=be,mode=max
          platforms: linux/amd64
          build-args: |
            G1G2_CERT=${{ secrets.G1G2_CERT }}
            ISSO_CLIENT_ID=${{ secrets.ISSO_CLIENT_ID }}
            ISSO_CLIENT_SECRET=${{ secrets.ISSO_CLIENT_SECRET }}
            IDNO_SALT=${{ secrets.IDNO_SALT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}

  # ── 3. Build FE (並行) ──
  build-fe:
    needs: prepare
    if: needs.prepare.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./Taipei-City-Dashboard-FE
          file: ./Taipei-City-Dashboard-FE/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.FE_IMAGE }}:${{ needs.prepare.outputs.tag }}
          cache-from: type=gha,scope=fe
          cache-to: type=gha,scope=fe,mode=max
          platforms: linux/amd64
          build-args: |
            NODE_ENV=${{ secrets.NODE_ENV }}
            VITE_APP_TITLE=${{ secrets.VITE_APP_TITLE }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_MAPBOXTOKEN=${{ secrets.VITE_MAPBOXTOKEN }}
            VITE_MAPBOXTILE=${{ secrets.VITE_MAPBOXTILE }}
            VITE_TAIPEIPASS_URL=${{ secrets.VITE_TAIPEIPASS_URL }}
            VITE_TAIPEIPASS_CLIENT_ID=${{ secrets.VITE_TAIPEIPASS_CLIENT_ID }}
            VITE_TAIPEIPASS_SCOPE=${{ secrets.VITE_TAIPEIPASS_SCOPE }}

  # ── 4. Deploy (等 build 完) ──
  deploy:
    needs: [prepare, build-be, build-fe]
    if: always() && (needs.build-be.result == 'success' || needs.build-fe.result == 'success')
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'sit' && 'sit' || 'prod' }}
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup tools
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Create ACR imagePullSecret
        run: |
          kubectl create secret docker-registry acr-secret \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username='${{ secrets.ACR_USERNAME }}' \
            --docker-password='${{ secrets.ACR_PASSWORD }}' \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply application secrets
        env:
          SECRETS_JSON: |
            {
              "DB_DASHBOARD_HOST": "${{ secrets.DB_DASHBOARD_HOST }}",
              "DB_DASHBOARD_PASSWORD": "${{ secrets.DB_DASHBOARD_PASSWORD }}",
              "DB_DASHBOARD_USER": "${{ secrets.DB_DASHBOARD_USER }}",
              "DB_DASHBOARD_DBNAME": "${{ secrets.DB_DASHBOARD_DBNAME }}",
              "DB_DASHBOARD_PORT": "${{ secrets.DB_DASHBOARD_PORT }}",
              "DB_MANAGER_HOST": "${{ secrets.DB_MANAGER_HOST }}",
              "DB_MANAGER_PASSWORD": "${{ secrets.DB_MANAGER_PASSWORD }}",
              "DB_MANAGER_USER": "${{ secrets.DB_MANAGER_USER }}",
              "DB_MANAGER_DBNAME": "${{ secrets.DB_MANAGER_DBNAME }}",
              "DB_MANAGER_PORT": "${{ secrets.DB_MANAGER_PORT }}",
              "REDIS_HOST": "${{ secrets.REDIS_HOST }}",
              "REDIS_PASSWORD": "${{ secrets.REDIS_PASSWORD }}",
              "REDIS_PORT": "${{ secrets.REDIS_PORT }}",
              "REDIS_DB": "${{ secrets.REDIS_DB }}",
              "JWT_SECRET": "${{ secrets.JWT_SECRET }}",
              "GIN_DOMAIN": "${{ secrets.GIN_DOMAIN }}",
              "IDNO_SALT": "${{ secrets.IDNO_SALT }}",
              "ISSO_CLIENT_ID": "${{ secrets.ISSO_CLIENT_ID }}",
              "ISSO_CLIENT_SECRET": "${{ secrets.ISSO_CLIENT_SECRET }}",
              "VITE_API_URL": "${{ secrets.VITE_API_URL }}",
              "VITE_MAPBOXTOKEN": "${{ secrets.VITE_MAPBOXTOKEN }}",
              "VITE_MAPBOXTILE": "${{ secrets.VITE_MAPBOXTILE }}",
              "VITE_TAIPEIPASS_URL": "${{ secrets.VITE_TAIPEIPASS_URL }}",
              "VITE_TAIPEIPASS_CLIENT_ID": "${{ secrets.VITE_TAIPEIPASS_CLIENT_ID }}",
              "VITE_TAIPEIPASS_SCOPE": "${{ secrets.VITE_TAIPEIPASS_SCOPE }}",
              "VITE_APP_TITLE": "${{ secrets.VITE_APP_TITLE }}",
              "BACKEND_URL": "${{ secrets.BACKEND_URL }}",
              "TWCC_API_URL": "${{ secrets.TWCC_API_URL }}",
              "TWCC_API_KEY": "${{ secrets.TWCC_API_KEY }}",
              "TWCC_MODEL": "${{ secrets.TWCC_MODEL }}",
              "TWCC_TIMEOUT": "${{ secrets.TWCC_TIMEOUT }}",
              "TWCC_MAX_RETRY": "${{ secrets.TWCC_MAX_RETRY }}",
              "TWCC_MAX_CONCURRENT": "${{ secrets.TWCC_MAX_CONCURRENT }}"
            }
        run: |
          ARGS=(create secret generic taipei-city-dashboard-secrets)
          while IFS='=' read -r key value; do
            [ -n "$value" ] && ARGS+=("--from-literal=${key}=${value}")
          done < <(echo "$SECRETS_JSON" | jq -r 'to_entries[] | select(.value != "") | "\(.key)=\(.value)"')
          kubectl "${ARGS[@]}" --namespace=${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy
        run: |
          TAG=${{ needs.prepare.outputs.tag }}
          helm upgrade --install ${{ env.RELEASE }} ./helm-chart \
            -f ${{ needs.prepare.outputs.helm_values }} \
            --set backend.image.tag=$TAG \
            --set frontend.image.tag=$TAG \
            --namespace ${{ env.NAMESPACE }} \
            --wait --timeout=20m

      - name: Summary
        run: |
          NS=${{ env.NAMESPACE }}
          echo "BE -> $(kubectl -n $NS get deploy taipei-city-dashboard-backend -o jsonpath='{.spec.template.spec.containers[0].image}')"
          echo "FE -> $(kubectl -n $NS get deploy taipei-city-dashboard-frontend -o jsonpath='{.spec.template.spec.containers[0].image}')"

      - name: Diagnostics on failure
        if: failure()
        run: |
          NS=${{ env.NAMESPACE }}
          kubectl -n $NS get deploy,po -o wide
          kubectl -n $NS get events --sort-by=.lastTimestamp | tail -50
