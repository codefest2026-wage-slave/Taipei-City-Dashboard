<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 雙北黑客松 — 提案總覽</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<style>
:root {
  --sidebar-w: 280px;
  --bg: #0d1117;
  --bg-2: #161b22;
  --bg-3: #21262d;
  --fg: #c9d1d9;
  --fg-muted: #8b949e;
  --accent: #58a6ff;
  --accent-2: #f0883e;
  --border: #30363d;
  --gold: #ffd700;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  min-height: 100vh;
}
/* sidebar */
#sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  overflow-y: auto;
  position: sticky;
  top: 0;
  height: 100vh;
}
.brand {
  padding: 0 20px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.brand h1 {
  font-size: 14px;
  margin: 0 0 4px;
  color: var(--fg);
  letter-spacing: 0.02em;
}
.brand p {
  font-size: 11px;
  margin: 0;
  color: var(--fg-muted);
  line-height: 1.5;
}
.nav-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-muted);
  padding: 12px 20px 6px;
  font-weight: 600;
}
nav a {
  display: block;
  padding: 9px 20px;
  color: var(--fg);
  text-decoration: none;
  font-size: 13px;
  border-left: 3px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}
nav a:hover { background: var(--bg-3); }
nav a.active {
  background: var(--bg-3);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 600;
}
nav a .badge {
  display: inline-block;
  font-size: 10px;
  background: var(--bg-3);
  color: var(--fg-muted);
  padding: 1px 6px;
  border-radius: 8px;
  margin-left: 6px;
  vertical-align: middle;
}
nav a.active .badge { background: var(--accent); color: var(--bg); }
nav a.gold-pin::before {
  content: "🏆 ";
  margin-right: 2px;
}
/* main */
#main {
  flex: 1;
  min-width: 0;
  padding: 32px 48px 80px;
  max-width: 980px;
}
#main .markdown-body {
  background: transparent;
  color: var(--fg);
  font-size: 15px;
}
#main .markdown-body h1,
#main .markdown-body h2,
#main .markdown-body h3,
#main .markdown-body h4 {
  border-bottom-color: var(--border);
  color: var(--fg);
}
#main .markdown-body table th,
#main .markdown-body table td { border-color: var(--border); }
#main .markdown-body table tr {
  background: var(--bg);
  border-top-color: var(--border);
}
#main .markdown-body table tr:nth-child(2n) { background: var(--bg-2); }
#main .markdown-body code {
  background: var(--bg-3);
  color: #ffa657;
}
#main .markdown-body pre {
  background: var(--bg-2);
  border: 1px solid var(--border);
}
#main .markdown-body pre code { color: var(--fg); }
#main .markdown-body blockquote {
  color: var(--fg-muted);
  border-left-color: var(--border);
  background: var(--bg-2);
  padding: 8px 16px;
  border-radius: 4px;
}
#main .markdown-body a { color: var(--accent); }
#main .markdown-body hr { background-color: var(--border); }
#main .markdown-body img {
  max-width: 100%;
  height: auto;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 18px 48px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(88,166,255,0.08);
  margin: 18px 0 8px;
  cursor: zoom-in;
  transition: transform 0.18s, box-shadow 0.18s;
}
#main .markdown-body img:hover {
  transform: translateY(-2px);
  box-shadow: 0 24px 64px -16px rgba(0,0,0,0.6), 0 0 0 1px rgba(88,166,255,0.18);
}
#main .markdown-body img + em,
#main .markdown-body p > img + br + em {
  display: block;
  text-align: center;
  font-size: 12px;
  color: var(--fg-muted);
  margin-top: -4px;
  margin-bottom: 16px;
}
/* lightbox */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  cursor: zoom-out;
  padding: 32px;
}
#lightbox.open { display: flex; }
#lightbox img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 8px;
  box-shadow: 0 32px 64px rgba(0,0,0,0.8);
}
/* loader */
.loader {
  text-align: center;
  padding: 80px 20px;
  color: var(--fg-muted);
}
.loader .spinner {
  display: inline-block;
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
/* meta header on each doc */
.doc-meta {
  background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
  border: 1px solid var(--border);
  border-left: 4px solid var(--accent);
  padding: 16px 20px;
  border-radius: 8px;
  margin-bottom: 24px;
  font-size: 13px;
  color: var(--fg-muted);
}
.doc-meta strong { color: var(--fg); }
.doc-meta .gold { color: var(--gold); font-weight: 600; }
/* mobile */
.menu-toggle {
  display: none;
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 100;
  background: var(--bg-3);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 14px;
}
@media (max-width: 768px) {
  body { display: block; }
  #sidebar {
    position: fixed;
    top: 0; left: -100%;
    height: 100vh;
    width: 85%;
    max-width: 320px;
    z-index: 50;
    transition: left 0.25s;
    box-shadow: 2px 0 24px rgba(0,0,0,0.5);
  }
  #sidebar.open { left: 0; }
  #main { padding: 60px 20px 80px; max-width: 100%; }
  .menu-toggle { display: block; }
}
/* scrollbar polish */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle">☰ 目錄</button>

<aside id="sidebar">
  <div class="brand">
    <h1>2026 雙北黑客松</h1>
    <p>城市儀表板提案總覽 · 18 提案 · 7 階段審查</p>
  </div>

  <div class="nav-section-title">v2 總覽 (5/2 競賽用)</div>
  <nav id="navSummary"></nav>

  <div class="nav-section-title">v2 主題 (今日可選)</div>
  <nav id="navV2Themes"></nav>

  <div class="nav-section-title">資料表 (可用資源)</div>
  <nav id="navDataTables"></nav>

  <div class="nav-section-title">v1 (備查)</div>
  <nav id="navV1Summary"></nav>
  <nav id="navV1Themes"></nav>
</aside>

<main id="main">
  <div id="content" class="markdown-body">
    <div class="loader"><div class="spinner"></div><p>載入中…</p></div>
  </div>
</main>

<div id="lightbox"><img alt=""></div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script>
const docs = [
  // v2 (current — hackathon 5/2)
  { id: 'final_review_v2',         file: 'final_review_v2.md',         title: '🏆 v2 最終終審',       badge: '4 persona',   group: 'summary', highlight: true },
  { id: 'triage_ranking_v2',       file: 'triage_ranking_v2.md',       title: '📊 v2 9 提案 Triage', badge: '排序',         group: 'summary' },
  { id: 'theme_01_smart_commute_v2', file: 'theme_01_smart_commute_v2.md', title: '01 智慧通勤 v2',  badge: '84',  group: 'v2_themes', accent: 'gold' },
  { id: 'theme_03_environment_v2',   file: 'theme_03_environment_v2.md',   title: '03 永續環境 v2',  badge: '84',  group: 'v2_themes' },
  { id: 'theme_04_food_health_v2',   file: 'theme_04_food_health_v2.md',   title: '04 食安健康 v2',  badge: '86',  group: 'v2_themes' },
  // 資料表（已部署於 main，可直接 query）
  { id: 'data_table_food_safety', file: 'data_table_food_safety.md', title: '🍴 食安 7 張表',  badge: 'dashboard 503', group: 'data_tables' },
  // v1 (preserved for reference)
  { id: 'final_review',          file: 'final_review.md',          title: 'v1 最終終審',         badge: '4 persona',   group: 'v1_summary' },
  { id: 'triage_ranking',        file: 'triage_ranking.md',        title: 'v1 18 提案 Triage',  badge: '排序',         group: 'v1_summary' },
  { id: 'theme_01_smart_commute',file: 'theme_01_smart_commute.md',title: '01 智慧通勤 v1',     badge: '82',          group: 'v1_themes' },
  { id: 'theme_02_disaster',     file: 'theme_02_disaster.md',     title: '02 韌性防災 v1',     badge: '78',          group: 'v1_themes' },
  { id: 'theme_03_environment',  file: 'theme_03_environment.md',  title: '03 永續環境 v1',     badge: '80',          group: 'v1_themes' },
  { id: 'theme_04_food_health',  file: 'theme_04_food_health.md',  title: '04 食安健康 v1',     badge: '75',          group: 'v1_themes' },
  { id: 'theme_05_labor',        file: 'theme_05_labor.md',        title: '05 勞動福祉 v1',     badge: '76',          group: 'v1_themes' },
  { id: 'theme_06_culture',      file: 'theme_06_culture.md',      title: '06 文化共融 v1',     badge: '80',          group: 'v1_themes' },
];

const docMetas = {
  final_review_v2: '<strong>內容</strong>: v2 重構後 4 persona 終審 · <span class="gold">🏆 最終推薦: T1#2 天氣懲罰圖 (4 persona 平均 79.0)</span>',
  triage_ranking_v2: '<strong>內容</strong>: v2 9 提案 state machine 排序 · 內審冠軍 T4#2 兒童傳染病 86 分',
  theme_01_smart_commute_v2: '<strong>主題</strong>: 智慧通勤 v2 · 3 重構提案 · <span class="gold">🏆 提案 #2 天氣懲罰圖 4 persona 冠軍</span>',
  theme_03_environment_v2: '<strong>主題</strong>: 永續環境 v2 · 3 重構提案 · 推薦 #2 噪音夜間殺手 (Demo 89 最炸)',
  theme_04_food_health_v2: '<strong>主題</strong>: 食安健康 v2 · 3 重構提案 · 推薦 #2 兒童傳染病雷達 (內審 86 最高)',
  data_table_food_safety: '<strong>資料表</strong>: 食安 7 張表（已部署 main）· 欄位 / 範圍 / 衍生指標 / 提案速查',
  final_review: '<strong>v1 (備查)</strong>: 4 persona 多視角終審 · 最終推薦: T1#2 末班車回家路 (87.5/100)',
  triage_ranking: '<strong>v1 (備查)</strong>: 18 提案 state machine 排序',
  theme_01_smart_commute: '<strong>v1 (備查)</strong>: 智慧通勤 · 3 提案 + 內審',
  theme_02_disaster: '<strong>v1 (備查)</strong>: 韌性防災 · 3 提案 + 內審 (5/2 不選)',
  theme_03_environment: '<strong>v1 (備查)</strong>: 永續環境 · 3 提案 + 內審',
  theme_04_food_health: '<strong>v1 (備查)</strong>: 食安健康 · 3 提案 + 內審',
  theme_05_labor: '<strong>v1 (備查)</strong>: 勞動福祉 · 3 提案 + 內審 (5/2 不選)',
  theme_06_culture: '<strong>v1 (備查)</strong>: 文化共融 · 3 提案 + 內審 (5/2 不選)',
};

// configure marked
marked.setOptions({
  gfm: true,
  breaks: false,
  highlight: (code, lang) => {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
    }
    return hljs.highlightAuto(code).value;
  }
});

// build nav
function buildNav() {
  const groups = {
    summary: document.getElementById('navSummary'),
    v2_themes: document.getElementById('navV2Themes'),
    data_tables: document.getElementById('navDataTables'),
    v1_summary: document.getElementById('navV1Summary'),
    v1_themes: document.getElementById('navV1Themes'),
  };
  docs.forEach(d => {
    const a = document.createElement('a');
    a.href = '#' + d.id;
    a.dataset.id = d.id;
    a.innerHTML = `${d.title}${d.badge ? `<span class="badge">${d.badge}</span>` : ''}`;
    if (d.highlight) a.classList.add('gold-pin');
    const target = groups[d.group] || groups.summary;
    target.appendChild(a);
  });
}

// load and render a doc
async function loadDoc(id) {
  const doc = docs.find(d => d.id === id);
  if (!doc) return loadDoc(docs[0].id);
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loader"><div class="spinner"></div><p>載入 ' + doc.title + '…</p></div>';

  // update active nav
  document.querySelectorAll('nav a').forEach(a => {
    a.classList.toggle('active', a.dataset.id === id);
  });

  try {
    const res = await fetch(doc.file + '?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const md = await res.text();
    const meta = docMetas[id] ? `<div class="doc-meta">${docMetas[id]}</div>` : '';
    content.innerHTML = meta + marked.parse(md);
    // re-highlight any code blocks marked didn't handle
    content.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
    // scroll to top of content
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');
    // update title
    document.title = doc.title + ' · 2026 雙北黑客松提案';
  } catch (e) {
    content.innerHTML = `<h1>載入失敗</h1><p>無法讀取 <code>${doc.file}</code>: ${e.message}</p><p>請確認檔案存在且 GitHub Pages 已啟用此目錄.</p>`;
  }
}

// hash routing
function route() {
  const id = location.hash.slice(1) || docs[0].id;
  loadDoc(id);
}

// menu toggle
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

// lightbox: click any image in content to zoom
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
document.getElementById('content').addEventListener('click', (e) => {
  if (e.target.tagName === 'IMG') {
    lightboxImg.src = e.target.src;
    lightboxImg.alt = e.target.alt || '';
    lightbox.classList.add('open');
  }
});
lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') lightbox.classList.remove('open');
});

// init
buildNav();
window.addEventListener('hashchange', route);
route();
</script>
</body>
</html>
